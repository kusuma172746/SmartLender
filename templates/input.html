<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Application</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1d4ed8,#38bdf8);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;

}

.container{

width:850px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border-radius:20px;
padding:35px;
box-shadow:0 15px 35px rgba(0,0,0,.35);

}

h1{

text-align:center;
color:white;
margin-bottom:30px;

}

form{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;

}

.form-group{

display:flex;
flex-direction:column;

}

label{

color:white;
font-weight:500;
margin-bottom:8px;

}

input,select{

padding:13px;
border:none;
border-radius:10px;
font-size:15px;
outline:none;

}

input:focus,
select:focus{

box-shadow:0 0 10px #38bdf8;

}

.full{

grid-column:1/3;

}

button{

padding:15px;
background:#38bdf8;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

button:hover{

background:white;
color:#2563eb;

}

</style>

</head>

<body>

<div class="container">

<h1>🏦 Loan Application Form</h1>

<form action="/predict" method="POST">

<div class="form-group">

<label>Gender</label>

<select name="Gender">

<option>Male</option>
<option>Female</option>

</select>

</div>

<div class="form-group">

<label>Married</label>

<select name="Married">

<option>Yes</option>
<option>No</option>

</select>

</div>

<div class="form-group">

<label>Dependents</label>

<select name="Dependents">

<option>0</option>
<option>1</option>
<option>2</option>
<option>3+</option>

</select>

</div>

<div class="form-group">

<label>Education</label>

<select name="Education">

<option>Graduate</option>
<option>Not Graduate</option>

</select>

</div>

<div class="form-group">

<label>Self Employed</label>

<select name="Self_Employed">

<option>Yes</option>
<option>No</option>

</select>

</div>

<div class="form-group">

<label>Property Area</label>

<select name="Property_Area">

<option>Urban</option>
<option>Semiurban</option>
<option>Rural</option>

</select>

</div>

<div class="form-group">

<label>Applicant Income</label>

<input type="number" name="ApplicantIncome" placeholder="Enter Income">

</div>

<div class="form-group">

<label>Coapplicant Income</label>

<input type="number" name="CoapplicantIncome" placeholder="Enter Income">

</div>

<div class="form-group">

<label>Loan Amount</label>

<input type="number" name="LoanAmount" placeholder="Loan Amount">

</div>

<div class="form-group">

<label>Loan Amount Term</label>

<input type="number" name="Loan_Amount_Term" placeholder="Loan Term">

</div>

<div class="form-group full">

<label>Credit History</label>

<select name="Credit_History">

<option>Good</option>
<option>Bad</option>

</select>

</div>

<div class="full">

<button type="submit">

Predict Loan Approval

</button>

</div>

</form>

</div>

</body>

</html>
